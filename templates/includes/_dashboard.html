<div class="container-fluid mb-4 mt-1">
    <!-- Barra Superior SmartWallet AI -->
    <div class="d-flex align-items-center p-3 mb-3 bg-white border rounded shadow-sm">
        <div class="me-3">
            <span class="badge bg-primary-gradient p-2"><i class="bi bi-robot fs-4"></i></span>
        </div>
        <div>
            <h4 class="mb-0 fw-bold text-dark">SmartWallet AI <span class="badge bg-info text-dark ms-2" style="font-size: 0.65rem;">BETA</span></h4>
            <span class="text-muted small">Acompanhamento e Educação Financeira Preditiva</span>
        </div>
        <div class="ms-auto">
            <button class="btn btn-outline-primary btn-sm" onclick="carregarProjecoesIA()">
                <i class="bi bi-magic me-1"></i>Analisar Finanças
            </button>
        </div>
    </div>

    <!-- Seção de Insights da IA (Dinamica) -->
    <div id="containerIA" class="row mb-4" style="display: none;">
        <div class="col-md-12">
            <div class="card border-primary bg-light bg-opacity-50">
                <div class="card-header bg-dark text-white py-2 d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-cpu-fill me-2"></i>Predições Inteligentes</span>
                    <button type="button" class="btn-close btn-close-white" onclick="document.getElementById('containerIA').style.display='none'"></button>
                </div>
                <div class="card-body">
                    <div class="row" id="iaInsightsContent">
                        <!-- Conteúdo gerado via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Linha 1: 3 Gráficos Principais -->
    <div class="row g-3 mb-4">
        <!-- Gráfico 1: Despesas por Categoria -->
        <div class="col-md-4">
            <div class="card h-100 shadow-sm">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-pie-chart-fill me-2"></i>Despesas por Categoria</span>
                    <button class="btn btn-outline-light btn-sm" onclick="exportarGrafico('categorias')" title="Baixar PNG">
                        <i class="bi bi-download"></i>
                    </button>
                </div>
                <div class="card-body">
                    <div style="position: relative; height: 250px;">
                        <canvas id="chartCategorias"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <!-- Gráfico 2: Evolução Mensal -->
        <div class="col-md-5">
            <div class="card h-100 shadow-sm">
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-bar-chart-line-fill me-2"></i>Evolução Mensal</span>
                    <button class="btn btn-outline-light btn-sm" onclick="exportarGrafico('evolucao')" title="Baixar PNG">
                        <i class="bi bi-download"></i>
                    </button>
                </div>
                <div class="card-body">
                    <div style="position: relative; height: 250px;">
                        <canvas id="chartEvolucao"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <!-- Gráfico 3: Status Pagamentos -->
        <div class="col-md-3">
            <div class="card h-100 shadow-sm">
                <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-donut me-2"></i>Status Pagamentos</span>
                    <button class="btn btn-outline-dark btn-sm" onclick="exportarGrafico('status')" title="Baixar PNG">
                        <i class="bi bi-download"></i>
                    </button>
                </div>
                <div class="card-body d-flex align-items-center justify-content-center">
                    <div style="position: relative; height: 200px; width: 100%;">
                        <canvas id="chartStatus"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Linha 2: Ranking -->
    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-trophy me-2"></i>Ranking de Despesas por Conta</span>
                    <div class="d-flex gap-2">
                        <input type="month" id="inputMesRanking" class="form-control form-control-sm" 
                            style="max-width: 150px;" value="{{ now.strftime('%Y-%m') if now else '2026-04' }}">
                        <button class="btn btn-primary btn-sm" onclick="carregarRankingMensal()">
                            <i class="bi bi-search me-1"></i>Filtrar
                        </button>
                        <button class="btn btn-outline-secondary btn-sm" onclick="limparRanking()">
                            <i class="bi bi-eraser me-1"></i>Limpar
                        </button>
                        <button class="btn btn-outline-light btn-sm" onclick="exportarGrafico('ranking')" title="Baixar PNG">
                            <i class="bi bi-download me-1"></i>PNG
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="chart-container" style="position: relative; height: 400px;">
                        <canvas id="graficoRankingMensal"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
